  <script src="js/md5.js" defer></script>
  <script src="js/code.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      readCookie();
      /* Each member gets an explicit shape + hue so they all look distinct */
      document.querySelectorAll('.m-shape-slot').forEach(function(el) {
        const fn    = el.dataset.fn;
        const ln    = el.dataset.ln;
        const shape = el.dataset.shape;
        const hue   = parseInt(el.dataset.hue, 10);
        const size  = 68;
        const init  = ((fn[0]||'') + (ln[0]||'')).toUpperCase();
        const fill  = 'hsla('+hue+',68%,52%,.24)';
        const str   = 'hsl('+hue+',80%,65%)';
        const tc    = 'hsl('+hue+',85%,78%)';
        const svgEl = _svgEl(shape);
        el.innerHTML =
          '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' +
          '<g fill="'+fill+'" stroke="'+str+'" stroke-width="3.5" stroke-linejoin="round">'+svgEl+'</g>' +
          '<text x="50" y="50" text-anchor="middle" dominant-baseline="central" '+
          'font-family="Syne,sans-serif" font-weight="700" font-size="28" fill="'+tc+'">'+init+'</text>' +
          '</svg>';
      });
    });
  </script>
</head>
